obstacle_range: 2.5
raytrace_range: 3.0
footprint: [[ 0.19,  0.19], [-0.19,  0.19], [-0.19, -0.19], [ 0.19, -0.19]]
footprint_padding: 0.10
inflation_radius: 0.7
transform_tolerance: 1
#cost_scaling_factor: 2.5

controller_patience: 4.0
planner_patience: 4.0

NavfnROS:
    allow_unknown: true
    # allow_unknown: false

recovery_behaviors: [
    {name: conservative_clear, type: clear_costmap_recovery/ClearCostmapRecovery},
    {name: aggressive_clear, type: clear_costmap_recovery/ClearCostmapRecovery}
]

conservative_clear: 
    reset_distance: .20
aggressive_clear:
    #reset_distance: 1.84
    reset_distance: .1

map_type: costmap
max_obstacle_height: .6
obstacle_layer:
    enabled: true
    origin_z: 0.4
    z_resolution: .1
    z_voxels: 1
    observation_sources: point_cloud_sensor
    publish_voxel_map: false
    #mark_threshold: 1

    point_cloud_sensor: 
        sensor_frame: zed_camera_center
        data_type: LaserScan 
        topic: /laser_scan_filtered 
        #expected_update_rate: 0.5, 
        expected_update_rate: 8 
        observation_persistence: 0
        marking: true 
        clearing: true
        inf_is_valid: true
        min_obstacle_height: .4
        max_obstacle_height: .45

inflation_layer:
    enabled:              true
    cost_scaling_factor:  10.0  # exponential rate at which the obstacle cost drops off (default: 10)
    inflation_radius:     0.5  # max. distance from an obstacle at which costs are incurred for planning paths.

local_inflation_layer:
    enabled:              true
    cost_scaling_factor:  10.0  # exponential rate at which the obstacle cost drops off (default: 10)
    inflation_radius:     0.5  # max. distance from an obstacle at which costs are incurred for planning paths.

static_layer:
    #map_topic: /rtabmap/grid_map
    map_topic: /map
    subscribe_to_updates: true
