local_costmap:
    global_frame: map
    robot_base_frame: base_link
    update_frequency: 8.0
    publish_frequency: 8.0
    static_map: false
    rolling_window: true
    width: 4.4
    height: 3.0
    resolution: 0.05
    origin_x: -0.0
    origin_y: -0.0

    plugins:
        - {name: obstacle_layer,      type: "costmap_2d::VoxelLayer"}
        - {name: local_inflation_layer,     type: "costmap_2d::InflationLayer"}
