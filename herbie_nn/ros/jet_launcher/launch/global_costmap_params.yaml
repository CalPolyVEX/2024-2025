global_costmap:
  global_frame: odom
  robot_base_frame: base_link
  update_frequency: 5.0
  publish_frequency: 2.0
  rolling_window: true
  width: 12.0
  height: 12.0
  resolution: 0.05
  #resolution: 0.025
  always_send_full_costmap: false

  plugins: 
    - {name: obstacles,               type: "costmap_2d::ObstacleLayer"}
    - {name: global_inflation_layer,  type: "costmap_2d::InflationLayer"}

