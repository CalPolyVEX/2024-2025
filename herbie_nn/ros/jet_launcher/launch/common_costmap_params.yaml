#set if you want the voxel map published
publish_voxel_map: false

transform_tolerance: 0.3
obstacle_range: 6
max_obstacle_height: 2.0
raytrace_range: 6.2
footprint: [[-0.195, -0.195], [-0.195, 0.195], [0.195, 0.195], [0.195, -0.195]]
footprint_padding: 0.15
lethal_cost_threshold: 200

plugins: 
    - {name: obstacles,        type: "costmap_2d::ObstacleLayer"}
    #- {name: inflation_layer,  type: "costmap_2d::InflationLayer"}

obstacles:
  observation_sources: see3_cam_sensor
  see3_cam_sensor: {sensor_frame: see3_cam, data_type: PointCloud2, 
             topic: /point_cloud, marking: true, clearing: True,
             observation_persistence: 0.0,
             expected_update_rate: 0.2}

inflation_layer:
    inflation_radius: 0.7 # adjust the inflation for your system setup
    cost_scaling_factor: 1.75

global_inflation_layer:
    inflation_radius: 0.7 # adjust the inflation for your system setup
    cost_scaling_factor: 1.75
