#set if you want the voxel map published
publish_voxel_map: false

transform_tolerance: 0.3
#obstacle_range: 2.5
obstacle_range: 8.5
max_obstacle_height: 2.0
raytrace_range: 9.0
footprint: [[-0.325, -0.325], [-0.325, 0.325], [0.325, 0.325], [0.46, 0.0], [0.325, -0.325]]
#robot_radius: 0.46
footprint_padding: 0.05
lethal_cost_threshold: 100

plugins: 
    - {name: obstacles,        type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer,  type: "costmap_2d::InflationLayer"}

obstacles:
  observation_sources: see3_cam
  see3_cam: {sensor_frame: see3_cam, data_type: LaserScan, 
             topic: /scan, marking: true, clearing: true,
             observation_persistence: 0.0,
             expected_update_rate: 0.2}

inflation_layer:
    inflation_radius: 0.55 # adjust the inflation for your system setup
    cost_scaling_factor: 1.0

base_scan: {data_type: LaserScan, expected_update_rate: 0.2,
  observation_persistence: 0.0, marking: true, clearing: true, max_obstacle_height: 0.4, min_obstacle_height: 0.08}