base_global_planner: "global_planner/GlobalPlanner"
base_local_planner: "dwa_local_planner/DWAPlannerROS"

DWAPlannerROS:
  max_vel_x: 1.25
  min_vel_x: 0.1

  max_vel_y: 0.0
  min_vel_y: 0.0

  max_vel_theta: 1.0
  min_vel_theta: 0.4

  acc_lim_th: 4.2
  acc_lim_x: 3.9
  acc_lim_y: 2.5
  acc_lim_trans: 2.5

  holonomic_robot: false

  sim_time: 2.0
  pdist_scale: .6
  occdist_scale: .02
  dwa: true

  #neutral_cost: 66
  #cost_factor: .55

  vx_samples: 20
  vy_samples: 0
  vth_samples: 40

GlobalPlanner:
  neutral_cost: 66
  cost_factor: .55
  default_tolerance: 1.0


recovery_behavior_enabled: true
recovery_behaviors:
  - name: 'aggressive_reset'
    type: 'clear_costmap_recovery/ClearCostmapRecovery'

aggressive_reset:
  reset_distance: 0.0
  layer_names: ["obstacles"]

planner_patience: 5.0
planner_frequency: .3
