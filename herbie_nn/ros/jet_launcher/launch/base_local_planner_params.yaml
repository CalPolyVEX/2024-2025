base_global_planner: "global_planner/GlobalPlanner"
base_local_planner: "dwa_local_planner/DWAPlannerROS"
#base_local_planner: "teb_local_planner/TebLocalPlannerROS"
latch_xy_goal_tolerance: true  #must be here in the global namespace due to a bug

planner_patience: 2.0
#planner_frequency: .5
planner_frequency: 0.0
controller_patience: 1.5
controller_frequency: 15

###################DWA Planner#############################
DWAPlannerROS:
  max_vel_x: 0.41
  min_vel_x: 0.1

  max_vel_y: 0.0
  min_vel_y: 0.0

  #max_vel_theta: 1.0
  max_speed_theta: .35
  #min_vel_theta: 0.2
  min_in_place_speed_theta: .15 

  acc_lim_theta: 5.0
  acc_lim_x: 3.0
  acc_lim_y: 0.0
  acc_lim_trans: 3.0

  holonomic_robot: false

  sim_time: 1.8
  # path_distance_bias: 34  # .6 in default config
  # goal_distance_bias: 20  # .8 in default config
  # occdist_scale: .05 # .01 in default config
  path_distance_bias: .6  # .6 in default config
  goal_distance_bias: .8  # .8 in default config
  occdist_scale: .02 # .01 in default config
  dwa: true

  #neutral_cost: 66
  #cost_factor: .55

  vx_samples: 11 #20
  vy_samples: 0
  vth_samples: 30 #40

  latch_xy_goal_tolerance: true
  xy_goal_tolerance: .1
  yaw_goal_tolerance: .10
  prune_plan: true
  global_frame_id: odom

###################Global Planner#############################
GlobalPlanner:
  neutral_cost: 66
  cost_factor: .55
  default_tolerance: 0.7
  allow_unknown: false

recovery_behavior_enabled: true
recovery_behaviors:
  - name: 'aggressive_reset'
    type: 'clear_costmap_recovery/ClearCostmapRecovery'

aggressive_reset:
  reset_distance: .01
  layer_names: ["obstacles"]


#############Teb Local Planner################################
TebLocalPlannerROS:

  odom_topic: ekf_node/odom
  map_frame: /odom
 
  # Trajectory
 
  teb_autosize: True
  dt_ref: 0.3
  dt_hysteresis: 0.1
  max_samples: 500
  global_plan_overwrite_orientation: True
  allow_init_with_backwards_motion: False
  #max_global_plan_lookahead_dist: 3.0
  max_global_plan_lookahead_dist: 2.5
  global_plan_viapoint_sep: -1
  # global_plan_viapoint_sep: .3
  global_plan_prune_distance: 1
  exact_arc_length: False
  feasibility_check_no_poses: 5
  publish_feedback: False
 
  # Robot
 
  max_vel_x: 0.4
  max_vel_x_backwards: 0.2
  max_vel_y: 0.0
  max_vel_theta: .5
  acc_lim_x: 0.5
  acc_lim_theta: 0.5
  min_turning_radius: 0.0
  footprint_model: # types: "point", "circular", "two_circles", "line", "polygon"
    type: "circular"
    radius: .26
    #radius: .2
 
  # GoalTolerance
 
  xy_goal_tolerance: 0.2
  yaw_goal_tolerance: 0.1
  free_goal_vel: False
  complete_global_plan: True
 
  # Obstacles
 
  #min_obstacle_dist: 0.27
  min_obstacle_dist: 0.27
  inflation_dist: 0.27
  include_costmap_obstacles: True
  #costmap_obstacles_behind_robot_dist: 1.0
  costmap_obstacles_behind_robot_dist: 0.6
  obstacle_poses_affected: 15
  #costmap_converter_spin_thread: True
  #costmap_converter_rate: 9
 
  # Optimization
 
  no_inner_iterations: 4
  no_outer_iterations: 5
  optimization_activate: True
  optimization_verbose: False
  penalty_epsilon: 0.1
  obstacle_cost_exponent: 4
  weight_max_vel_x: 2
  weight_max_vel_theta: 1
  #weight_acc_lim_x: 1
  weight_acc_lim_x: 0  #ignore acceleration limits
  #weight_acc_lim_theta: 1
  weight_acc_lim_theta: 0  #ignore acceleration limits
  weight_kinematics_nh: 1000
  weight_kinematics_forward_drive: 700
  weight_kinematics_turning_radius: 1
  weight_optimaltime: 1 # must be > 0
  weight_shortest_path: 0
  weight_obstacle: 100
  weight_inflation: 0.2
  weight_dynamic_obstacle: 10
  weight_dynamic_obstacle_inflation: 0.2
  #weight_viapoint: 1
  weight_viapoint: 2
  weight_adapt_factor: 2

  # Homotopy Class Planner
 
  enable_homotopy_class_planning: False
  enable_multithreading: True
  max_number_classes: 1
  selection_cost_hysteresis: 1.0
  selection_prefer_initial_plan: 0.9
  selection_obst_cost_scale: 100.0
  selection_alternative_time_cost: False

  roadmap_graph_no_samples: 15
  roadmap_graph_area_width: 5
  roadmap_graph_area_length_scale: 1.0
  h_signature_prescaler: 0.5
  h_signature_threshold: 0.1
  obstacle_heading_threshold: 0.45
  switching_blocking_period: 0.0
  viapoints_all_candidates: True
  delete_detours_backwards: True
  max_ratio_detours_duration_best_duration: 3.0
  visualize_hc_graph: False
  visualize_with_time_as_z_axis_scale: False

  # Recovery

  shrink_horizon_backup: True
  shrink_horizon_min_duration: 10
  oscillation_recovery: True
  oscillation_v_eps: 0.1
  oscillation_omega_eps: 0.1
  oscillation_recovery_min_duration: 10
  oscillation_filter_duration: 10

  ## Costmap converter plugin
  
  costmap_converter_plugin: "costmap_converter::CostmapToLinesDBSRANSAC"
  # costmap_converter_plugin: ""
  costmap_converter_spin_thread: True
  costmap_converter_rate: 10

  costmap_converter/CostmapToLinesDBSRANSAC:
    cluster_max_distance: 0.4
    cluster_min_pts: 2
    ransac_inlier_distance: 0.15
    #ransac_min_inliers: 10
    ransac_min_inliers: 12
    #ransac_no_iterations: 1500
    ransac_no_iterations: 1000
    ransac_remaining_outliers: 3
    ransac_convert_outlier_pts: True
    ransac_filter_remaining_outlier_pts: False
    convex_hull_min_pt_separation: 0.1
