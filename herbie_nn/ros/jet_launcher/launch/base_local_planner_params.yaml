base_global_planner: "global_planner/GlobalPlanner"
base_local_planner: "dwa_local_planner/DWAPlannerROS"
#base_local_planner: "teb_local_planner/TebLocalPlannerROS"

###################DWA Planner#############################
DWAPlannerROS:
  max_vel_x: 1.25
  min_vel_x: 0.1

  max_vel_y: 0.0
  min_vel_y: 0.0

  max_vel_theta: 1.0
  min_vel_theta: 0.1

  acc_lim_th: 4.2
  acc_lim_x: 4.2
  acc_lim_y: 2.5
  acc_lim_trans: 3.0

  holonomic_robot: false

  sim_time: 1.3
  path_distance_bias: 32
  goal_distance_bias: 20
  occdist_scale: .02
  dwa: true

  #neutral_cost: 66
  #cost_factor: .55

  vx_samples: 20
  vy_samples: 0
  vth_samples: 40

  latch_xy_goal_tolerance: true
  xy_goal_tolerance: .1
  yaw_goal_tolerance: .05

###################Global Planner#############################
GlobalPlanner:
  neutral_cost: 66
  cost_factor: .55
  default_tolerance: 0.7

recovery_behavior_enabled: true
recovery_behaviors:
  - name: 'aggressive_reset'
    type: 'clear_costmap_recovery/ClearCostmapRecovery'

aggressive_reset:
  reset_distance: 0.0
  layer_names: ["obstacles"]

planner_patience: 5.0
planner_frequency: .5

