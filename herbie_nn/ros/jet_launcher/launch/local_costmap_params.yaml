local_costmap:
  global_frame: odom
  robot_base_frame: base_link
  update_frequency: 12.0
  publish_frequency: 4.0

  rolling_window: true
  width: 5.0
  height: 4.0
  resolution: 0.025

  plugins: 
      - {name: obstacles,        type: "costmap_2d::ObstacleLayer"}
      - {name: inflation_layer,  type: "costmap_2d::InflationLayer"}
