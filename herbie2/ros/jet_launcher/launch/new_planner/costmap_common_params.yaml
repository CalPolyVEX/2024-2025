latch_xy_goal_tolerance: true
obstacle_range: 5.0
raytrace_range: 6.0
footprint: [[ 0.19,  0.19], [-0.19,  0.19], [-0.19, -0.19], [ 0.19, -0.19]]
footprint_padding: 0.10
transform_tolerance: 1

obstacle_layer:
    enabled: true
    origin_z: 0.3048
    #origin_z: 0.2 #for CNN
    z_resolution: .1
    z_voxels: 1
    observation_sources: laser_sensor
    publish_voxel_map: false
    #mark_threshold: 1

    laser_sensor: 
        sensor_frame: laser
        data_type: LaserScan 
        topic: /scan_filtered 
        expected_update_rate: 10 
        observation_persistence: 0
        marking: true 
        clearing: true
        inf_is_valid: true
        min_obstacle_height: .30
        max_obstacle_height: .31
        
inflation_layer:
    enabled:              true
    cost_scaling_factor:  3.8  # exponential rate at which the obstacle cost drops off (default: 10)
    inflation_radius:     1.0  # max. distance from an obstacle at which costs are incurred for planning paths.

local_inflation_layer:
    enabled:              true
    cost_scaling_factor:  4.0  # exponential rate at which the obstacle cost drops off (default: 10)
    inflation_radius:     0.8  # max. distance from an obstacle at which costs are incurred for planning paths.

static_layer:
    map_topic: /map
    subscribe_to_updates: true
